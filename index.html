<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>B2 Speaking — Part 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap');

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0e1018;
  --surface: #13151f;
  --card:    #181b27;
  --border:  rgba(221,228,240,.08);
  --border2: rgba(221,228,240,.14);
  --text:    #dde4f0;
  --muted:   rgba(221,228,240,.5);
  --faint:   rgba(221,228,240,.25);
  --vfaint:  rgba(221,228,240,.1);
  --green:   #58BB43;
  --green-d: rgba(88,187,67,.09);
  --green-b: rgba(88,187,67,.35);
  --hh: 50px;
  --fh: 44px;
  --ff: 'DM Sans', sans-serif;
  --fd: 'Fraunces', serif;
}

html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--ff); overflow:hidden; }

/* ── LOAD ── */
#load { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:999; }
#load.gone { display:none; }
.ld-title { font-family:var(--fd); font-size:22px; font-style:italic; color:var(--text); }
.ld-sub   { font-size:11px; color:var(--faint); letter-spacing:.1em; }
.ld-err   { font-size:13px; color:#f06c6c; text-align:center; max-width:320px; line-height:1.6; }
.spin { width:24px; height:24px; border:1.5px solid var(--border2); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
#hdr {
  position:fixed; top:0; left:0; right:0; height:var(--hh); z-index:100;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}
.hdr-brand { display:flex; flex-direction:column; gap:2px; }
.hdr-t { font-size:13px; font-weight:600; color:var(--text); }
.hdr-s { font-size:9px; color:var(--faint); letter-spacing:.1em; }

.mode-pill {
  display:flex; background:var(--vfaint);
  border:1px solid var(--border); border-radius:99px; padding:3px; gap:2px;
}
.mb {
  font-size:11px; font-weight:600; letter-spacing:.05em;
  padding:5px 16px; border-radius:99px; border:none; cursor:pointer;
  font-family:var(--ff); background:transparent; color:var(--faint);
  transition:all .2s;
}
.mb.on { background:rgba(221,228,240,.1); color:var(--text); }

.prompt-btn {
  font-size:11px; font-weight:500; padding:5px 12px;
  border-radius:7px; border:1px solid var(--border2);
  background:transparent; color:var(--muted); cursor:pointer;
  font-family:var(--ff); transition:all .2s; white-space:nowrap;
}
.prompt-btn:hover { color:var(--text); border-color:rgba(221,228,240,.25); }

/* ── FUNCTION STRIP ── */
#fstrip {
  position:fixed; top:var(--hh); left:0; right:0; height:var(--fh); z-index:90;
  background:var(--bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px;
  padding:0 20px; overflow-x:auto;
  scrollbar-width:none;
}
#fstrip::-webkit-scrollbar { display:none; }
.fb {
  font-size:11px; font-weight:600; letter-spacing:.04em; white-space:nowrap;
  padding:5px 14px; border-radius:99px;
  border:1px solid var(--border); background:transparent; color:var(--faint);
  cursor:pointer; font-family:var(--ff); transition:all .18s; flex-shrink:0;
}
.fb:hover { color:var(--muted); border-color:var(--border2); }
.fb.on { background:rgba(221,228,240,.08); color:var(--text); border-color:var(--border2); }
.fb-clear {
  margin-left:auto; font-size:10px; color:var(--vfaint);
  background:none; border:none; cursor:pointer;
  font-family:var(--ff); letter-spacing:.05em; flex-shrink:0;
  transition:color .15s;
}
.fb-clear:hover { color:var(--faint); }

/* ── APP ── */
#app {
  position:fixed;
  top:calc(var(--hh) + var(--fh));
  left:0; right:0; bottom:0;
  overflow:hidden;
}

/* ── CLASS VIEW ── */
#classView {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center;
  overflow-y:auto;
  padding:24px 20px 100px;
  scrollbar-width:thin;
  scrollbar-color:var(--vfaint) transparent;
}

.prompt-box {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:14px; padding:16px 24px;
  text-align:center; max-width:480px; width:100%;
  margin-bottom:20px; flex-shrink:0;
}
.pb-emoji { font-size:28px; margin-bottom:8px; display:block; }
.pb-text {
  font-family:var(--fd); font-size:16px; font-style:italic;
  color:var(--muted); line-height:1.5;
}

/* Phrase grid */
#phraseGrid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:9px; width:100%; max-width:900px;
}
.pcell {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:12px 14px;
  cursor:pointer; transition:border-color .15s, background .15s;
  position:relative;
}
.pcell:hover { border-color:var(--border2); background:var(--card); }
.pcell.dim { opacity:.1; pointer-events:none; }
.pcell.used {
  background:var(--green-d); border-color:var(--green-b);
  cursor:default;
}
.pcell.used:hover { background:var(--green-d); border-color:var(--green-b); }
.pc-stem { font-size:13px; font-weight:600; color:var(--text); line-height:1.35; margin-bottom:5px; }
.pc-conn { font-size:11px; color:var(--faint); font-style:italic; font-family:var(--fd); line-height:1.35; }
.pc-who { font-size:10px; font-weight:600; color:var(--green); margin-top:7px; letter-spacing:.04em; }

/* ── STUDENT PANEL ── */
#stu {
  position:fixed; bottom:0; left:0; right:0; z-index:80;
  background:var(--surface); border-top:1px solid var(--border2);
  padding:10px 20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.22,1,.36,1);
}
#stu.open { transform:translateY(0); }
.stu-lbl { font-size:10px; color:var(--faint); letter-spacing:.08em; flex-shrink:0; }
#stuName {
  background:var(--card); border:1px solid var(--border2);
  border-radius:7px; padding:6px 12px; font-size:13px;
  color:var(--text); outline:none; width:130px; font-family:var(--ff);
}
#stuName:focus { border-color:rgba(221,228,240,.3); }
.stu-mark {
  font-size:11px; font-weight:600; padding:7px 16px; border-radius:7px;
  border:1px solid var(--green-b); background:var(--green-d); color:var(--green);
  cursor:pointer; font-family:var(--ff); transition:all .15s;
}
.stu-mark:hover { background:rgba(88,187,67,.15); }
.stu-close {
  margin-left:auto; font-size:11px; color:var(--faint);
  background:none; border:none; cursor:pointer; font-family:var(--ff);
}
.stu-close:hover { color:var(--muted); }

/* ── SOLO VIEW ── */
#soloView {
  width:100%; height:100%;
  display:none; flex-direction:column; align-items:center;
  overflow-y:auto; padding:20px 16px 80px;
  scrollbar-width:thin; scrollbar-color:var(--vfaint) transparent;
}

.solo-prompt {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; padding:14px 20px;
  text-align:center; max-width:520px; width:100%; margin-bottom:16px;
}
.sop-em { font-size:24px; margin-bottom:6px; display:block; }
.sop-q { font-family:var(--fd); font-size:15px; font-style:italic; color:var(--muted); line-height:1.45; }

.func-tabs {
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
  max-width:520px; width:100%; margin-bottom:16px;
}
.ftab {
  font-size:11px; font-weight:600; letter-spacing:.04em;
  padding:5px 13px; border-radius:99px;
  border:1px solid var(--border); background:transparent; color:var(--faint);
  cursor:pointer; font-family:var(--ff); transition:all .18s;
}
.ftab:hover { color:var(--muted); border-color:var(--border2); }
.ftab.on { background:rgba(221,228,240,.08); color:var(--text); border-color:var(--border2); }

.solo-progress { font-size:11px; color:var(--faint); letter-spacing:.06em; margin-bottom:12px; }

.solo-card {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; padding:18px 20px;
  max-width:520px; width:100%; margin-bottom:10px;
}
.sc-stem { font-size:16px; font-weight:600; color:var(--text); margin-bottom:6px; line-height:1.35; }
.sc-conn { font-size:12px; color:var(--faint); font-style:italic; font-family:var(--fd); margin-bottom:12px; line-height:1.4; }
.sc-example { font-size:13px; color:var(--muted); line-height:1.6; display:none; border-top:1px solid var(--border); padding-top:11px; margin-top:2px; }
.sc-example.show { display:block; }

.rev-btn {
  font-size:10px; padding:5px 14px; border-radius:99px;
  border:1px solid var(--border); background:transparent;
  color:var(--faint); cursor:pointer; font-family:var(--ff);
  transition:all .15s; margin-bottom:16px;
}
.rev-btn:hover { color:var(--muted); border-color:var(--border2); }

.solo-dots { display:flex; gap:5px; align-items:center; justify-content:center; margin-bottom:12px; }
.sd {
  width:7px; height:7px; border-radius:50%;
  border:1px solid rgba(221,228,240,.2); cursor:pointer;
  transition:all .15s; flex-shrink:0;
}
.sd.cur { width:18px; border-radius:99px; background:var(--text); border-color:var(--text); }
.sd.done { background:rgba(221,228,240,.2); border-color:rgba(221,228,240,.2); }

.solo-arrows { display:flex; gap:8px; align-items:center; }
.sa {
  width:30px; height:30px; border-radius:50%;
  border:1px solid var(--border2); background:transparent;
  color:var(--muted); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.sa:hover { background:rgba(221,228,240,.06); color:var(--text); }
.sa:disabled { opacity:.2; cursor:default; }

/* ── PROMPT DROPDOWN ── */
#pdrop {
  position:fixed; top:calc(var(--hh) + 6px); right:20px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; min-width:260px; z-index:300;
  box-shadow:0 8px 32px rgba(0,0,0,.4); display:none; overflow:hidden;
}
#pdrop.show { display:block; }
.pd-item {
  display:flex; align-items:center; gap:12px;
  padding:11px 15px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background .15s;
}
.pd-item:last-child { border-bottom:none; }
.pd-item:hover { background:rgba(221,228,240,.04); }
.pd-item.sel .pd-q { color:var(--text); }
.pd-em { font-size:20px; flex-shrink:0; }
.pd-q { font-family:var(--fd); font-size:13px; font-style:italic; color:var(--muted); line-height:1.3; }

/* ── RESPONSIVE ── */
@media(max-width:600px) {
  :root { --hh:46px; --fh:40px; }
  #hdr { padding:0 14px; }
  .hdr-t { font-size:12px; }
  .mb { font-size:10px; padding:4px 12px; }
  .prompt-btn { font-size:10px; padding:4px 10px; }
  #fstrip { padding:0 12px; gap:5px; }
  .fb { font-size:10px; padding:4px 11px; }
  #classView { padding:16px 12px 80px; }
  #phraseGrid { grid-template-columns:1fr 1fr; gap:7px; }
  .pc-stem { font-size:12px; }
  #soloView { padding:16px 12px 70px; }
  .sc-stem { font-size:15px; }
}
</style>
</head>
<body>

<div id="load">
  <div class="spin"></div>
  <div class="ld-title">B2 Speaking</div>
  <div class="ld-sub">PART 2 — FUNCTIONAL LANGUAGE</div>
</div>

<div id="hdr">
  <div class="hdr-brand">
    <div class="hdr-t">B2 Speaking — Part 2</div>
    <div class="hdr-s">FUNCTIONAL LANGUAGE</div>
  </div>
  <div class="mode-pill">
    <button class="mb on" id="btnClass" onclick="setMode('class')">CLASS</button>
    <button class="mb"    id="btnSolo"  onclick="setMode('solo')">SOLO</button>
  </div>
  <button class="prompt-btn" id="promptBtn" onclick="toggleDrop()">Prompt ▾</button>
</div>

<div id="fstrip"></div>

<div id="pdrop"></div>

<div id="app">
  <div id="classView"></div>
  <div id="soloView"></div>
</div>

<div id="stu">
  <span class="stu-lbl">USED BY</span>
  <input id="stuName" placeholder="Student name…" maxlength="24" autocomplete="off">
  <button class="stu-mark" onclick="markUsed()">Mark as used ✓</button>
  <button class="stu-close" onclick="closeStu()">✕</button>
</div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let D = {};
let mode = 'class';
let promptIdx = 0;
let activeFunc = null;
let pendingCell = null;   // { funcId, phraseIdx }
let usedMap = {};         // "funcId:phraseIdx" → studentName
let soloFuncIdx = 0;
let soloPhraseIdx = 0;
let soloRevealed = {};    // "funcId:phraseIdx" → bool

// ═══════════════════════════════════════
//  LOAD
// ═══════════════════════════════════════
async function load() {
  try {
    const r = await fetch('speaking-data.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    D = await r.json();
    document.getElementById('load').classList.add('gone');
    buildAll();
  } catch(e) {
    document.getElementById('load').innerHTML =
      `<div class="ld-err"><strong>Could not load speaking-data.json</strong><br><br>
       Place the JSON file in the same folder and serve via a local server or GitHub Pages.<br><br>
       <span style="opacity:.4">${e.message}</span></div>`;
  }
}

function buildAll() {
  buildPromptDrop();
  buildFstrip();
  renderClass();
  renderSolo();
}

// ═══════════════════════════════════════
//  MODE
// ═══════════════════════════════════════
function setMode(m) {
  mode = m;
  document.getElementById('btnClass').classList.toggle('on', m === 'class');
  document.getElementById('btnSolo').classList.toggle('on',  m === 'solo');
  document.getElementById('classView').style.display = m === 'class' ? 'flex' : 'none';
  document.getElementById('soloView').style.display  = m === 'solo'  ? 'flex' : 'none';
  document.getElementById('fstrip').style.display    = m === 'class' ? 'flex' : 'none';
  document.getElementById('promptBtn').style.display = '';
  closeStu();
}

// ═══════════════════════════════════════
//  PROMPT DROPDOWN
// ═══════════════════════════════════════
function buildPromptDrop() {
  document.getElementById('pdrop').innerHTML = D.prompts.map((p,i) =>
    `<div class="pd-item${i===promptIdx?' sel':''}" onclick="selectPrompt(${i})">
       <span class="pd-em">${p.emoji}</span>
       <span class="pd-q">${p.text}</span>
     </div>`
  ).join('');
}

function toggleDrop() {
  const el = document.getElementById('pdrop');
  el.classList.toggle('show');
}

function selectPrompt(i) {
  promptIdx = i;
  usedMap = {};
  activeFunc = null;
  document.getElementById('pdrop').classList.remove('show');
  buildPromptDrop();
  buildFstrip();
  renderClass();
  renderSolo();
}

document.addEventListener('click', e => {
  const d = document.getElementById('pdrop');
  const b = document.getElementById('promptBtn');
  if (!d.contains(e.target) && e.target !== b) d.classList.remove('show');
});

// ═══════════════════════════════════════
//  FUNCTION STRIP
// ═══════════════════════════════════════
function buildFstrip() {
  const strip = document.getElementById('fstrip');
  strip.innerHTML = D.functions.map(f =>
    `<button class="fb${activeFunc===f.id?' on':''}" onclick="selectFunc('${f.id}')">${f.label}</button>`
  ).join('') + `<button class="fb-clear" onclick="clearFunc()">clear</button>`;
}

function selectFunc(id) {
  activeFunc = activeFunc === id ? null : id;
  buildFstrip();
  renderClass();
}

function clearFunc() {
  activeFunc = null;
  buildFstrip();
  renderClass();
}

// ═══════════════════════════════════════
//  CLASS VIEW
// ═══════════════════════════════════════
function renderClass() {
  const v = document.getElementById('classView');
  const p = D.prompts[promptIdx];

  let cells = '';
  D.functions.forEach(fn => {
    fn.phrases.forEach((ph, pi) => {
      const key = fn.id + ':' + pi;
      const who = usedMap[key];
      const isUsed = !!who;
      const isDim  = activeFunc && activeFunc !== fn.id && !isUsed;
      cells += `<div class="pcell${isUsed?' used':''}${isDim?' dim':''}"
                  data-func="${fn.id}" data-idx="${pi}">
                  <div class="pc-stem">${ph.stem}</div>
                  <div class="pc-conn">${ph.connector}</div>
                  ${who ? `<div class="pc-who">${who}</div>` : ''}
                </div>`;
    });
  });

  v.innerHTML = `
    <div class="prompt-box">
      <span class="pb-emoji">${p.emoji}</span>
      <div class="pb-text">${p.text}</div>
    </div>
    <div id="phraseGrid">${cells}</div>`;

  v.querySelectorAll('.pcell:not(.used):not(.dim)').forEach(c => {
    c.addEventListener('click', () => openStu(c.dataset.func, +c.dataset.idx));
  });
}

// ═══════════════════════════════════════
//  STUDENT PANEL
// ═══════════════════════════════════════
function openStu(funcId, phraseIdx) {
  pendingCell = { funcId, phraseIdx };
  document.getElementById('stuName').value = '';
  document.getElementById('stu').classList.add('open');
  setTimeout(() => document.getElementById('stuName').focus(), 180);
}

function closeStu() {
  pendingCell = null;
  document.getElementById('stu').classList.remove('open');
}

function markUsed() {
  if (!pendingCell) return;
  const name = document.getElementById('stuName').value.trim() || 'Student';
  usedMap[pendingCell.funcId + ':' + pendingCell.phraseIdx] = name;
  closeStu();
  renderClass();
}

document.getElementById('stuName').addEventListener('keydown', e => {
  if (e.key === 'Enter') markUsed();
  if (e.key === 'Escape') closeStu();
});

// ═══════════════════════════════════════
//  SOLO VIEW
// ═══════════════════════════════════════
function renderSolo() {
  const v = document.getElementById('soloView');
  const p = D.prompts[promptIdx];
  const fn = D.functions[soloFuncIdx];
  const ph = fn.phrases[soloPhraseIdx];
  const key = fn.id + ':' + soloPhraseIdx;
  const revealed = !!soloRevealed[key];

  const tabs = D.functions.map((f,i) =>
    `<button class="ftab${i===soloFuncIdx?' on':''}" onclick="soloSetFunc(${i})">${f.label}</button>`
  ).join('');

  const dots = fn.phrases.map((_,i) => {
    const done = !!soloRevealed[fn.id + ':' + i];
    const cur  = i === soloPhraseIdx;
    return `<div class="sd${cur?' cur':done?' done':''}" onclick="soloGoTo(${i})"></div>`;
  }).join('');

  const prevDis = soloFuncIdx === 0 && soloPhraseIdx === 0 ? 'disabled' : '';
  const nextDis = soloFuncIdx === D.functions.length-1 && soloPhraseIdx === fn.phrases.length-1 ? 'disabled' : '';

  v.innerHTML = `
    <div class="solo-prompt">
      <span class="sop-em">${p.emoji}</span>
      <div class="sop-q">${p.text}</div>
    </div>
    <div class="func-tabs">${tabs}</div>
    <div class="solo-progress">${fn.label} — ${soloPhraseIdx+1} of ${fn.phrases.length}</div>
    <div class="solo-card">
      <div class="sc-stem">${ph.stem}</div>
      <div class="sc-conn">${ph.connector}</div>
      <div class="sc-example${revealed?' show':''}">${ph.example}</div>
    </div>
    <button class="rev-btn" onclick="toggleReveal('${key}')">${revealed?'Hide example':'Show example'}</button>
    <div class="solo-dots">${dots}</div>
    <div class="solo-arrows">
      <button class="sa" onclick="soloPrev()" ${prevDis}>←</button>
      <button class="sa" onclick="soloNext()" ${nextDis}>→</button>
    </div>`;
}

function soloSetFunc(i) {
  soloFuncIdx = i;
  soloPhraseIdx = 0;
  renderSolo();
  document.getElementById('soloView').scrollTo(0,0);
}

function soloGoTo(i) {
  soloPhraseIdx = i;
  renderSolo();
}

function toggleReveal(key) {
  soloRevealed[key] = !soloRevealed[key];
  renderSolo();
}

function soloNext() {
  const fn = D.functions[soloFuncIdx];
  if (soloPhraseIdx < fn.phrases.length - 1) {
    soloPhraseIdx++;
  } else if (soloFuncIdx < D.functions.length - 1) {
    soloFuncIdx++;
    soloPhraseIdx = 0;
  }
  renderSolo();
  document.getElementById('soloView').scrollTo(0,0);
}

function soloPrev() {
  if (soloPhraseIdx > 0) {
    soloPhraseIdx--;
  } else if (soloFuncIdx > 0) {
    soloFuncIdx--;
    soloPhraseIdx = D.functions[soloFuncIdx].phrases.length - 1;
  }
  renderSolo();
  document.getElementById('soloView').scrollTo(0,0);
}

// touch swipe (solo)
let tx = 0;
document.getElementById('app').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
document.getElementById('app').addEventListener('touchend', e => {
  if (mode !== 'solo') return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 44) dx < 0 ? soloNext() : soloPrev();
}, {passive:true});

// keyboard
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (mode === 'solo') {
    if (e.key === 'ArrowRight') soloNext();
    if (e.key === 'ArrowLeft')  soloPrev();
  }
});

// resize — re-render class grid
let rt;
window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(renderClass, 150); });

// init
setMode('class');
load();
</script>
</body>
</html>
