<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>B2 Speaking — Part 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap');

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #0e1018;
  --surface: #13151f;
  --card:    #181b27;
  --border:  rgba(221,228,240,.08);
  --border2: rgba(221,228,240,.14);
  --text:    #dde4f0;
  --muted:   rgba(221,228,240,.5);
  --faint:   rgba(221,228,240,.25);
  --vfaint:  rgba(221,228,240,.1);
  --green:   #58BB43;
  --green-d: rgba(88,187,67,.09);
  --green-b: rgba(88,187,67,.35);
  --hh: 52px;
  --fh: 46px;
  --ff: 'DM Sans', sans-serif;
  --fd: 'Fraunces', serif;
}

html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--ff); overflow:hidden; }

/* ── LOAD ── */
#load { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:999; }
#load.gone { display:none; }
.ld-title { font-family:var(--fd); font-size:22px; font-style:italic; color:var(--text); }
.ld-sub   { font-size:11px; color:var(--faint); letter-spacing:.1em; }
.ld-err   { font-size:13px; color:#f06c6c; text-align:center; max-width:320px; line-height:1.6; }
.spin { width:24px; height:24px; border:1.5px solid var(--border2); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── HEADER ── */
#hdr {
  position:fixed; top:0; left:0; right:0; height:var(--hh); z-index:100;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; gap:12px;
}
.hdr-brand { display:flex; flex-direction:column; gap:1px; min-width:0; }
.hdr-t { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; }
.hdr-s { font-size:9px; color:var(--faint); letter-spacing:.1em; }

.mode-pill {
  display:flex; background:var(--vfaint);
  border:1px solid var(--border); border-radius:99px; padding:3px; gap:2px; flex-shrink:0;
}
.mb {
  font-size:11px; font-weight:600; letter-spacing:.05em;
  padding:5px 16px; border-radius:99px; border:none; cursor:pointer;
  font-family:var(--ff); background:transparent; color:var(--faint);
  transition:all .2s;
}
.mb.on { background:rgba(221,228,240,.1); color:var(--text); }

.prompt-btn {
  font-size:11px; font-weight:500; padding:5px 12px;
  border-radius:7px; border:1px solid var(--border2);
  background:transparent; color:var(--muted); cursor:pointer;
  font-family:var(--ff); transition:all .2s; white-space:nowrap; flex-shrink:0;
}
.prompt-btn:hover { color:var(--text); border-color:rgba(221,228,240,.25); }

/* ── FUNCTION STRIP ── */
#fstrip {
  position:fixed; top:var(--hh); left:0; right:0; height:var(--fh); z-index:90;
  background:var(--bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px;
  padding:0 16px; overflow-x:auto; scrollbar-width:none;
}
#fstrip::-webkit-scrollbar { display:none; }
.fb {
  font-size:11px; font-weight:600; letter-spacing:.04em; white-space:nowrap;
  padding:5px 14px; border-radius:99px;
  border:1px solid var(--border); background:transparent; color:var(--faint);
  cursor:pointer; font-family:var(--ff); transition:all .18s; flex-shrink:0;
}
.fb:hover { color:var(--muted); border-color:var(--border2); }
.fb.on { background:rgba(221,228,240,.08); color:var(--text); border-color:var(--border2); }

/* ── APP ── */
#app {
  position:fixed;
  top:calc(var(--hh) + var(--fh));
  left:0; right:0; bottom:0;
  overflow:hidden;
}

/* ══════════════════════════════
   CLASS VIEW
══════════════════════════════ */
#classView {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center;
  overflow-y:auto;
  padding:20px 16px 80px;
  scrollbar-width:thin;
  scrollbar-color:var(--vfaint) transparent;
}

.prompt-box {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:14px; padding:14px 20px;
  text-align:center; max-width:520px; width:100%;
  margin-bottom:18px; flex-shrink:0;
}
.pb-emoji { font-size:26px; margin-bottom:6px; display:block; }
.pb-text {
  font-family:var(--fd); font-size:15px; font-style:italic;
  color:var(--muted); line-height:1.5;
}

/* Phrase grid — drag-and-drop */
#phraseGrid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
  gap:8px; width:100%; max-width:960px;
}

.pcell {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:12px 14px;
  cursor:grab; transition:border-color .15s, background .15s, opacity .15s, box-shadow .15s;
  position:relative; user-select:none;
}
.pcell:hover { border-color:var(--border2); background:var(--card); }
.pcell.used {
  background:var(--green-d); border-color:var(--green-b);
  cursor:default;
}
.pcell.used:hover { background:var(--green-d); border-color:var(--green-b); }
.pcell.dragging {
  opacity:.4; cursor:grabbing; box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.pcell.drag-over { border-color:rgba(221,228,240,.4); background:rgba(221,228,240,.04); }

.pc-stem { font-size:13px; font-weight:600; color:var(--text); line-height:1.35; margin-bottom:4px; }
.pc-conn { font-size:11px; color:var(--faint); font-style:italic; font-family:var(--fd); line-height:1.3; }
.pc-who { font-size:10px; font-weight:600; color:var(--green); margin-top:6px; letter-spacing:.04em; }
.pc-fn {
  position:absolute; top:8px; right:10px;
  font-size:9px; font-weight:700; letter-spacing:.06em;
  color:var(--faint); opacity:.5;
}

/* ── STUDENT PANEL ── */
#stu {
  position:fixed; bottom:0; left:0; right:0; z-index:80;
  background:var(--surface); border-top:1px solid var(--border2);
  padding:10px 20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.22,1,.36,1);
}
#stu.open { transform:translateY(0); }
.stu-lbl { font-size:10px; color:var(--faint); letter-spacing:.08em; flex-shrink:0; }
#stuName {
  background:var(--card); border:1px solid var(--border2);
  border-radius:7px; padding:6px 12px; font-size:13px;
  color:var(--text); outline:none; width:140px; font-family:var(--ff);
}
#stuName:focus { border-color:rgba(221,228,240,.3); }
.stu-mark {
  font-size:11px; font-weight:600; padding:7px 16px; border-radius:7px;
  border:1px solid var(--green-b); background:var(--green-d); color:var(--green);
  cursor:pointer; font-family:var(--ff); transition:all .15s;
}
.stu-mark:hover { background:rgba(88,187,67,.15); }
.stu-close {
  margin-left:auto; font-size:11px; color:var(--faint);
  background:none; border:none; cursor:pointer; font-family:var(--ff);
}
.stu-close:hover { color:var(--muted); }

/* ══════════════════════════════
   SOLO VIEW
══════════════════════════════ */
#soloView {
  width:100%; height:100%;
  display:none; flex-direction:column; align-items:center;
  overflow-y:auto; padding:20px 16px 40px;
  scrollbar-width:thin; scrollbar-color:var(--vfaint) transparent;
}

.solo-prompt {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; padding:14px 20px;
  text-align:center; max-width:760px; width:100%; margin-bottom:16px;
}
.sop-em { font-size:22px; margin-bottom:5px; display:block; }
.sop-q { font-family:var(--fd); font-size:15px; font-style:italic; color:var(--muted); line-height:1.45; }

/* Function tabs in solo */
.func-tabs {
  display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
  max-width:760px; width:100%; margin-bottom:18px;
}
.ftab {
  font-size:11px; font-weight:600; letter-spacing:.04em;
  padding:5px 13px; border-radius:99px;
  border:1px solid var(--border); background:transparent; color:var(--faint);
  cursor:pointer; font-family:var(--ff); transition:all .18s;
}
.ftab:hover { color:var(--muted); border-color:var(--border2); }
.ftab.on { background:rgba(221,228,240,.08); color:var(--text); border-color:var(--border2); }

/* 3-choice cards row */
#choiceRow {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px; max-width:760px; width:100%; margin-bottom:18px;
}
.choice-card {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; padding:16px 16px 14px;
  cursor:pointer; transition:all .18s;
  display:flex; flex-direction:column; gap:6px;
}
.choice-card:hover { background:var(--card); border-color:rgba(221,228,240,.25); transform:translateY(-1px); }
.choice-card.picked {
  background:rgba(221,228,240,.05); border-color:rgba(221,228,240,.35);
  cursor:default; transform:none;
}
.cc-num { font-size:10px; color:var(--faint); letter-spacing:.08em; font-weight:600; }
.cc-stem { font-size:14px; font-weight:600; color:var(--text); line-height:1.35; }
.cc-conn { font-size:11px; color:var(--faint); font-style:italic; font-family:var(--fd); line-height:1.3; }

/* Expanded response */
#expandedBox {
  max-width:760px; width:100%;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; overflow:hidden;
  display:none;
}
#expandedBox.show { display:block; animation:fadeUp .35s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.exp-header {
  padding:14px 20px 10px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.exp-stem { font-size:15px; font-weight:600; color:var(--text); }
.exp-conn { font-size:11px; color:var(--faint); font-style:italic; font-family:var(--fd); }

.exp-body { padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
.exp-row { display:flex; flex-direction:column; gap:4px; }
.exp-label {
  font-size:9px; font-weight:700; letter-spacing:.12em;
  color:var(--faint); text-transform:uppercase;
}
.exp-text { font-size:13px; color:var(--muted); line-height:1.65; }
.exp-text.highlight { color:var(--text); font-weight:500; }

.exp-next {
  margin:0 20px 16px; font-size:11px; font-weight:600;
  padding:8px 20px; border-radius:8px;
  border:1px solid var(--border2); background:transparent; color:var(--muted);
  cursor:pointer; font-family:var(--ff); transition:all .15s; align-self:flex-start;
  display:inline-block;
}
.exp-next:hover { color:var(--text); border-color:rgba(221,228,240,.3); }

/* ── PROMPT DROPDOWN ── */
#pdrop {
  position:fixed; top:calc(var(--hh) + 6px); right:20px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:12px; min-width:280px; z-index:300;
  box-shadow:0 8px 32px rgba(0,0,0,.5); display:none; overflow:hidden;
  max-height:calc(100vh - 80px); overflow-y:auto;
}
#pdrop.show { display:block; }
.pd-item {
  display:flex; align-items:center; gap:12px;
  padding:10px 14px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background .15s;
}
.pd-item:last-child { border-bottom:none; }
.pd-item:hover { background:rgba(221,228,240,.04); }
.pd-item.sel { background:rgba(221,228,240,.05); }
.pd-item.sel .pd-q { color:var(--text); }
.pd-em { font-size:18px; flex-shrink:0; }
.pd-q { font-family:var(--fd); font-size:12px; font-style:italic; color:var(--muted); line-height:1.3; }

/* ── RESPONSIVE ── */
@media(max-width:640px) {
  :root { --hh:46px; --fh:40px; }
  #hdr { padding:0 12px; gap:8px; }
  .hdr-t { font-size:12px; }
  .mb { font-size:10px; padding:4px 12px; }
  #phraseGrid { grid-template-columns:1fr 1fr; gap:6px; }
  #choiceRow { grid-template-columns:1fr; }
  .pc-stem { font-size:12px; }
  .cc-stem { font-size:13px; }
}
@media(max-width:420px) {
  #phraseGrid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="load">
  <div class="spin"></div>
  <div class="ld-title">B2 Speaking</div>
  <div class="ld-sub">PART 2 — FUNCTIONAL LANGUAGE</div>
</div>

<div id="hdr">
  <div class="hdr-brand">
    <div class="hdr-t">B2 Speaking — Part 2</div>
    <div class="hdr-s">FUNCTIONAL LANGUAGE</div>
  </div>
  <div class="mode-pill">
    <button class="mb on" id="btnClass" onclick="setMode('class')">CLASS</button>
    <button class="mb"    id="btnSolo"  onclick="setMode('solo')">SOLO</button>
  </div>
  <button class="prompt-btn" id="promptBtn" onclick="toggleDrop()">Prompt ▾</button>
</div>

<div id="fstrip"></div>
<div id="pdrop"></div>

<div id="app">
  <div id="classView"></div>
  <div id="soloView"></div>
</div>

<!-- Student panel (class mode) -->
<div id="stu">
  <span class="stu-lbl">USED BY</span>
  <input id="stuName" placeholder="Student name…" maxlength="24" autocomplete="off">
  <button class="stu-mark" onclick="markUsed()">Mark as used ✓</button>
  <button class="stu-close" onclick="closeStu()">✕</button>
</div>

<script>
// ═══════════════════════════
//  STATE
// ═══════════════════════════
let D = {};
let mode      = 'class';
let promptIdx = 0;
let activeFunc = null;     // class mode filter
let pendingCell = null;    // { funcId, phraseIdx }
let usedMap = {};          // "funcId:phraseIdx" → studentName
let cardOrder = [];        // array of {funcId, phraseIdx} — class mode order

let soloFuncIdx  = 0;
let soloPickedIdx = null;  // which of the 3 choices was picked (0,1,2)
let soloTriple   = [];     // 3 phrase objects for current round

// drag state
let dragSrc = null;

// ═══════════════════════════
//  LOAD
// ═══════════════════════════
async function load() {
  try {
    const r = await fetch('speaking-data.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    D = await r.json();
    document.getElementById('load').classList.add('gone');
    buildAll();
  } catch(e) {
    document.getElementById('load').innerHTML =
      `<div class="ld-err"><strong>Could not load speaking-data.json</strong><br><br>
       Place the JSON file in the same folder and serve via a local server or GitHub Pages.<br><br>
       <span style="opacity:.4">${e.message}</span></div>`;
  }
}

function buildAll() {
  rebuildOrder();
  buildPromptDrop();
  buildFstrip();
  renderClass();
  renderSolo();
}

// flat order array — all phrases across all functions
function rebuildOrder() {
  cardOrder = [];
  D.functions.forEach(fn => {
    fn.phrases.forEach((_, pi) => cardOrder.push({ funcId: fn.id, phraseIdx: pi }));
  });
}

// ═══════════════════════════
//  MODE
// ═══════════════════════════
function setMode(m) {
  mode = m;
  document.getElementById('btnClass').classList.toggle('on', m === 'class');
  document.getElementById('btnSolo').classList.toggle('on',  m === 'solo');
  document.getElementById('classView').style.display = m === 'class' ? 'flex' : 'none';
  document.getElementById('soloView').style.display  = m === 'solo'  ? 'flex' : 'none';
  document.getElementById('fstrip').style.display    = m === 'class' ? 'flex' : 'none';
  closeStu();
}

// ═══════════════════════════
//  PROMPT DROPDOWN
// ═══════════════════════════
function buildPromptDrop() {
  document.getElementById('pdrop').innerHTML = D.prompts.map((p,i) =>
    `<div class="pd-item${i===promptIdx?' sel':''}" onclick="selectPrompt(${i})">
       <span class="pd-em">${p.emoji}</span>
       <span class="pd-q">${p.text}</span>
     </div>`
  ).join('');
}

function toggleDrop() {
  document.getElementById('pdrop').classList.toggle('show');
}

function selectPrompt(i) {
  promptIdx = i;
  usedMap   = {};
  rebuildOrder();
  activeFunc = null;
  document.getElementById('pdrop').classList.remove('show');
  buildPromptDrop();
  buildFstrip();
  renderClass();
  soloFuncIdx   = 0;
  soloPickedIdx = null;
  dealSoloTriple();
  renderSolo();
}

document.addEventListener('click', e => {
  const d = document.getElementById('pdrop');
  const b = document.getElementById('promptBtn');
  if (!d.contains(e.target) && e.target !== b) d.classList.remove('show');
});

// ═══════════════════════════
//  FUNCTION STRIP (class)
// ═══════════════════════════
function buildFstrip() {
  const strip = document.getElementById('fstrip');
  strip.innerHTML = D.functions.map(f =>
    `<button class="fb${activeFunc===f.id?' on':''}" onclick="selectFunc('${f.id}')">${f.label}</button>`
  ).join('');
}

function selectFunc(id) {
  activeFunc = activeFunc === id ? null : id;
  buildFstrip();
  renderClass();
}

// ═══════════════════════════
//  CLASS VIEW
// ═══════════════════════════
function getPhrase(funcId, phraseIdx) {
  const fn = D.functions.find(f => f.id === funcId);
  return fn ? fn.phrases[phraseIdx] : null;
}
function getFunc(funcId) { return D.functions.find(f => f.id === funcId); }

function renderClass() {
  const v = document.getElementById('classView');
  const p = D.prompts[promptIdx];

  // filter by activeFunc if set
  const visible = activeFunc
    ? cardOrder.filter(c => c.funcId === activeFunc)
    : cardOrder;

  let cells = visible.map((c, i) => {
    const ph  = getPhrase(c.funcId, c.phraseIdx);
    const fn  = getFunc(c.funcId);
    if (!ph || !fn) return '';
    const key = c.funcId + ':' + c.phraseIdx;
    const who = usedMap[key];
    const isUsed = !!who;
    return `<div class="pcell${isUsed?' used':''}"
                data-func="${c.funcId}" data-idx="${c.phraseIdx}"
                data-order="${i}"
                draggable="${isUsed?'false':'true'}">
              <div class="pc-fn">${fn.label.toUpperCase()}</div>
              <div class="pc-stem">${ph.stem}</div>
              <div class="pc-conn">${ph.connector}</div>
              ${who ? `<div class="pc-who">${who}</div>` : ''}
            </div>`;
  }).join('');

  v.innerHTML = `
    <div class="prompt-box">
      <span class="pb-emoji">${p.emoji}</span>
      <div class="pb-text">${p.text}</div>
    </div>
    <div id="phraseGrid">${cells}</div>`;

  // click to open student panel
  v.querySelectorAll('.pcell:not(.used)').forEach(c => {
    c.addEventListener('click', () => openStu(c.dataset.func, +c.dataset.idx));
  });

  // drag-and-drop
  setupDrag();
}

// ── DRAG-AND-DROP ──
function setupDrag() {
  const cells = document.querySelectorAll('.pcell:not(.used)');
  cells.forEach(cell => {
    cell.addEventListener('dragstart', onDragStart);
    cell.addEventListener('dragenter', onDragEnter);
    cell.addEventListener('dragover',  onDragOver);
    cell.addEventListener('dragleave', onDragLeave);
    cell.addEventListener('drop',      onDrop);
    cell.addEventListener('dragend',   onDragEnd);
  });
}

function onDragStart(e) {
  dragSrc = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', this.dataset.order);
}
function onDragEnter(e) { e.preventDefault(); this.classList.add('drag-over'); }
function onDragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onDragLeave()  { this.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  if (dragSrc === this) return;

  const srcFunc = dragSrc.dataset.func;
  const srcIdx  = +dragSrc.dataset.idx;
  const tgtFunc = this.dataset.func;
  const tgtIdx  = +this.dataset.idx;

  // find positions in cardOrder
  const srcPos = cardOrder.findIndex(c => c.funcId === srcFunc && c.phraseIdx === srcIdx);
  const tgtPos = cardOrder.findIndex(c => c.funcId === tgtFunc && c.phraseIdx === tgtIdx);
  if (srcPos < 0 || tgtPos < 0) return;

  const [moved] = cardOrder.splice(srcPos, 1);
  cardOrder.splice(tgtPos, 0, moved);
  renderClass();
}
function onDragEnd() {
  document.querySelectorAll('.pcell').forEach(c => {
    c.classList.remove('dragging','drag-over');
  });
  dragSrc = null;
}

// ── STUDENT PANEL ──
function openStu(funcId, phraseIdx) {
  pendingCell = { funcId, phraseIdx };
  document.getElementById('stuName').value = '';
  document.getElementById('stu').classList.add('open');
  setTimeout(() => document.getElementById('stuName').focus(), 180);
}

function closeStu() {
  pendingCell = null;
  document.getElementById('stu').classList.remove('open');
}

function markUsed() {
  if (!pendingCell) return;
  const name = document.getElementById('stuName').value.trim() || 'Student';
  usedMap[pendingCell.funcId + ':' + pendingCell.phraseIdx] = name;
  closeStu();
  renderClass();
}

document.getElementById('stuName').addEventListener('keydown', e => {
  if (e.key === 'Enter')  markUsed();
  if (e.key === 'Escape') closeStu();
});

// ═══════════════════════════
//  SOLO VIEW
// ═══════════════════════════

// Deal 3 phrases from current function (or across all if not enough)
function dealSoloTriple() {
  soloPickedIdx = null;
  const fn = D.functions[soloFuncIdx];
  const phrases = fn.phrases;
  // Shuffle a copy and take 3 (or fewer)
  const shuffled = [...phrases.keys()].sort(() => Math.random() - .5).slice(0, 3);
  soloTriple = shuffled.map(pi => ({ phraseIdx: pi, phrase: phrases[pi] }));
}

function renderSolo() {
  const v = document.getElementById('soloView');
  const p = D.prompts[promptIdx];
  const fn = D.functions[soloFuncIdx];

  const tabs = D.functions.map((f,i) =>
    `<button class="ftab${i===soloFuncIdx?' on':''}" onclick="soloSetFunc(${i})">${f.label}</button>`
  ).join('');

  // Build choice cards
  const choices = soloTriple.map((t, ci) => {
    const picked = soloPickedIdx === ci;
    return `<div class="choice-card${picked?' picked':''}" onclick="pickChoice(${ci})">
      <div class="cc-num">OPTION ${ci+1}</div>
      <div class="cc-stem">${t.phrase.stem}</div>
      <div class="cc-conn">${t.phrase.connector}</div>
    </div>`;
  }).join('');

  // Expanded box (shown only after pick)
  let expHtml = '';
  if (soloPickedIdx !== null) {
    const t = soloTriple[soloPickedIdx];
    const ph = t.phrase;
    const ex = ph.expanded;
    expHtml = `
      <div id="expandedBox" class="show">
        <div class="exp-header">
          <div>
            <div class="exp-stem">${ph.stem}</div>
            <div class="exp-conn">${ph.connector}</div>
          </div>
        </div>
        <div class="exp-body">
          <div class="exp-row">
            <div class="exp-label">Point</div>
            <div class="exp-text highlight">${ex.point}</div>
          </div>
          <div class="exp-row">
            <div class="exp-label">Reason</div>
            <div class="exp-text">${ex.reason}</div>
          </div>
          <div class="exp-row">
            <div class="exp-label">Example</div>
            <div class="exp-text">${ex.example}</div>
          </div>
          <div class="exp-row">
            <div class="exp-label">Contrast</div>
            <div class="exp-text">${ex.contrast}</div>
          </div>
          <div class="exp-row">
            <div class="exp-label">Conclusion</div>
            <div class="exp-text">${ex.conclusion}</div>
          </div>
        </div>
        <button class="exp-next" onclick="nextSoloRound()">Next 3 phrases →</button>
      </div>`;
  } else {
    expHtml = `<div id="expandedBox"></div>`;
  }

  v.innerHTML = `
    <div class="solo-prompt">
      <span class="sop-em">${p.emoji}</span>
      <div class="sop-q">${p.text}</div>
    </div>
    <div class="func-tabs">${tabs}</div>
    <div id="choiceRow">${choices}</div>
    ${expHtml}`;

  if (soloPickedIdx !== null) {
    setTimeout(() => {
      const box = document.getElementById('expandedBox');
      if (box) box.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }, 100);
  }
}

function pickChoice(ci) {
  if (soloPickedIdx !== null) return; // already picked
  soloPickedIdx = ci;
  renderSolo();
}

function nextSoloRound() {
  dealSoloTriple();
  renderSolo();
  document.getElementById('soloView').scrollTo({ top:0, behavior:'smooth' });
}

function soloSetFunc(i) {
  soloFuncIdx = i;
  dealSoloTriple();
  renderSolo();
  document.getElementById('soloView').scrollTo({ top:0, behavior:'smooth' });
}

// ═══════════════════════════
//  INIT
// ═══════════════════════════
setMode('class');
load();
</script>
</body>
</html>
